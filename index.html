async function dbGet(date) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/day_logs?date=eq.${date}&select=*`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await r.json();
    return rows.length > 0 ? rows[0].data : null;
  } catch(e) { return null; }
}

async function dbSet(date, data) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/day_logs`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({ date, data })
    });
    if (!r.ok) {
      const err = await r.text();
      console.error("dbSet error:", r.status, err);
    }
  } catch(e) { console.error("dbSet exception:", e); }
}

async function dbDelete(date) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/day_logs?date=eq.${date}`, {
      method: "DELETE",
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
  } catch(e) {}
}

async function dbGetAll() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/day_logs?select=date,data&order=date.asc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await r.json();
    const h = {};
    rows.forEach(row => { if(row.data) h[row.date] = row.data; });
    return h;
  } catch(e) { return get("shaah_history") || {}; }
}

// ── STORAGE ──────────────────────────────────────────────────────────────────
const get=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const set=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const todayKey=()=>new Date().toISOString().slice(0,10);
const getChecked=k=>get(`check_${k}`)||{};
const setChecked=(k,v)=>{set(`check_${k}`,v);};
const getSocial=k=>get(`social_${k}`)||{flirt:false,strangers:false,friends:false};
const setSocial=(k,v)=>set(`social_${k}`,v);
// History cache - synced with Supabase
let _historyCache = get("shaah_history") || {};

const getHistory=()=>_historyCache;
const setHistory=v=>{ _historyCache=v; set("shaah_history",v); };

async function syncHistory() {
  const remote = await dbGetAll();
  if (Object.keys(remote).length > 0) {
    const tk = todayKey();
    for (const [date, data] of Object.entries(remote)) {
      // Restore checks and social for each date
      if (data._checks) {
        const existing = getChecked(date);
        // Only overwrite if remote is newer (has more checked items)
        const remoteCount = Object.values(data._checks).filter(Boolean).length;
        const localCount = Object.values(existing).filter(Boolean).length;
        if (remoteCount >= localCount) {
          setChecked(date, data._checks);
          if (data._social) setSocial(date, data._social);
        }
      }
      // Store history without internal fields
      const {_checks, _social, ...entry} = data;
      _historyCache[date] = entry;
    }
    set("shaah_history", _historyCache);
  }
  render();
}

// ── SCORE CALC ────────────────────────────────────────────────────────────────
function calcScore(key){
  const ch=getChecked(key), soc=getSocial(key);
  const activeSubs=Object.values(soc).filter(Boolean).length;
  const socialPts=ch.social?(activeSubs>0?Math.round((activeSubs/3)*18):18):0;
  const l1=LVL1.reduce((a,i)=>a+(ch[i.id]?i.pts:0),0);
  const l2=LVL2.reduce((a,i)=>a+(ch[i.id]?i.pts:0),0);
  const l3=socialPts+(ch.nosmoke?6:0)+(ch.pomodoro?6:0);
  return{score:l1+l2+l3,l1,l2,l3,done:Object.values(ch).filter(Boolean).length};
}

function saveToHistory(key){
  const{score,l1,l2,l3,done}=calcScore(key);
  const h=getHistory();
  const ch=getChecked(key);
  const soc=getSocial(key);
  if(score>0){
    const entry={score,grade:GRADE(score).l,l1,l2,l3,done};
    h[key]=entry;
    setHistory(h);
    dbSet(key, {...entry, _checks:ch, _social:soc}); // sync full state to Supabase
  } else {
    delete h[key];
    setHistory(h);
    dbDelete(key); // remove from Supabase
  }
}

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
function ringPath(score,max,size,thick,col,glow){
  const r=(size-thick)/2-2,c=2*Math.PI*r,off=c-(Math.min(score,max)/max)*c,cx=size/2;
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg);filter:drop-shadow(0 0 ${size*.1}px ${glow});overflow:visible">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#0f0f1e" stroke-width="${thick}"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${thick}" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 0.6s cubic-bezier(0.34,1.56,0.64,1),stroke 0.4s"/>
  </svg>`;
}

function checkBox(on,col,size=22){
  const br=Math.round(size*.32);
  return`<div style="width:${size}px;height:${size}px;border-radius:${br}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;${on?`background:${col};box-shadow:0 0 10px ${col}66;border:none`:`border:1.5px solid #252535;background:transparent`}">
    ${on?`<svg width="${size*.55}" height="${size*.55}" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#080810" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
  </div>`;
}

function barHTML(pct,col,glow,h=6){
  return`<div style="height:${h}px;border-radius:99px;background:#0f0f1e;overflow:hidden">
    <div style="height:100%;border-radius:99px;width:${Math.min(pct,100)}%;background:${col};${pct>0?`box-shadow:0 0 8px ${glow}`:""}"></div>
  </div>`;
}

// ── STREAK ────────────────────────────────────────────────────────────────────
function getStreak(){
  const h=getHistory(); let s=0;
  for(let i=0;i<365;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(h[k]&&h[k].score>=60)s++;else if(i>0)break;
  }
  return s;
}

function getDays(n){
  const days=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    days.push({key,date:d,data:getHistory()[key]||null});
  }
  return days;
}

function getWeeks(){const d=getDays(28);return[0,1,2,3].map(w=>d.slice(w*7,w*7+7));}
function avgWeek(days){const f=days.filter(d=>d.data);return f.length?Math.round(f.reduce((a,d)=>a+d.data.score,0)/f.length):0;}

  else if(currentTab==="today")el.innerHTML=renderToday(todayKey());
  else if(currentTab==="stats")el.innerHTML=renderStats();
  else if(currentTab==="history")el.innerHTML=renderHistory();
}

    </div>

    ${streak>0?`<div style="background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.12);border-radius:12px;padding:9px 20px;font-size:11px;color:#FFD700;letter-spacing:0.08em">🔥 ${streak} día${streak!==1?"s":""} en racha</div>`:""}

        <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer" onclick="handleSocial('${key}')">
          <div style="display:flex;align-items:center;gap:13px">
            ${checkBox(!!ch.social,"#fbbf24")}
            <div>
              <div style="font-size:13px;font-weight:${ch.social?500:300}">👥 Social Combo</div>
              ${socialExpanded?`<div style="font-size:9px;color:#666;margin-top:2px">${activeSubs}/3 activos · ${socialPts}%</div>`:""}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:9px" onclick="event.stopPropagation()">

            ${checkBox(!!soc[s.id],"#fbbf24",18)}
            <span>${s.icon} ${s.label}</span>
            <span style="margin-left:auto;font-size:9px;color:#252535">6%</span>
          </div>`).join("")}
        </div>`:""}
      </div>
      ${[{id:"nosmoke",label:"No Fumar",icon:"🚭",pts:6},{id:"pomodoro",label:"Pomodoro",icon:"🍅",pts:6}].map(item=>`
      <div class="row${ch[item.id]?" on":""}" style="margin-bottom:3px" onclick="toggleHabit('${item.id}','${key}')">
        <div style="display:flex;align-items:center;gap:13px">
          ${checkBox(!!ch[item.id],"#fbbf24")}

      </div>`).join("")}

    ${isToday?`<button onclick="resetDay('${key}')" style="background:none;border:1px solid #111120;color:#1e1e2e;font-family:inherit;font-size:9px;letter-spacing:0.22em;padding:10px 24px;border-radius:10px;cursor:pointer;margin-top:6px">RESET DÍA</button>`:""}
  </div>`;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const tk=todayKey();
  const{score,l1,l2,l3,done}=calcScore(tk);
  const gr=GRADE(score);
  const h=getHistory();
  const allDays=Object.entries(h).sort(([a],[b])=>a.localeCompare(b));
  const total=allDays.length;
  const best=allDays.reduce((m,[,d])=>Math.max(m,d.score),0);
  const oAvg=total?Math.round(allDays.reduce((a,[,d])=>a+d.score,0)/total):0;
  const streak=getStreak();

  return`<div class="fade-up" style="padding:calc(22px + env(safe-area-inset-top)) 16px calc(100px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:16px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[
        {icon:"🔥",label:"RACHA ACTUAL",  val:`${streak}d`, col:"#FFD700", sub:streak>0?"días ≥ 60%":"sin racha"},
        {icon:"📊",label:"PROMEDIO",       val:`${oAvg}%`,  col:oAvg>0?GRADE(oAvg).c:"#333", sub:oAvg>0?GRADE(oAvg).n:"—"},
        {icon:"🏆",label:"MEJOR DÍA",      val:`${best}%`,  col:best>0?GRADE(best).c:"#333", sub:best>0?GRADE(best).n:"—"},
        {icon:"📅",label:"DÍAS REGISTRADOS",val:total,      col:"#60a5fa", sub:"en total"},
      ].map(m=>`<div class="card" style="border:1px solid ${m.col}20;background:${m.col}08">
        <div style="font-size:20px;margin-bottom:8px">${m.icon}</div>
        <div style="font-family:'Bebas Neue';font-size:28px;color:${m.col};line-height:1">${m.val}</div>
        <div style="font-size:8px;color:#3a3a4a;margin-top:5px;letter-spacing:0.15em">${m.label}</div>
        <div style="font-size:9px;color:${m.col};margin-top:3px;opacity:0.65">${m.sub}</div>
      </div>`).join("")}
    </div>

    <div>
      <div class="sec">HOY — DESGLOSE</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div style="position:relative;width:80px;height:80px;flex-shrink:0">
            ${ringPath(score,MAX,80,6,gr.c,gr.g)}
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
              <span style="font-family:'Bebas Neue';font-size:20px;color:${gr.c};line-height:1">${score}</span>
              <span style="font-size:7px;color:${gr.c};opacity:0.6">%</span>
            </div>
          </div>
          <div>
            <div style="font-family:'Bebas Neue';font-size:48px;color:${gr.c};line-height:1;text-shadow:0 0 24px ${gr.g}">${gr.l}</div>
            <div style="font-size:9px;color:#2a2a3a;letter-spacing:0.12em;margin-top:4px">${gr.n}</div>
          </div>
        </div>
        ${[[`⬛ CORE`,l1,LVL1_MAX,"#e2e2e2"],[`▪ HABITS`,l2,LVL2_MAX,"#a78bfa"],[`· BONUS`,l3,LVL3_MAX,"#fbbf24"]].map(([lb,v,mx,c])=>`
        <div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;font-size:9px;color:#2a2a3a;margin-bottom:7px">
            <span>${lb}</span><span style="color:${v>0?c:"#252535"}">${v}<span style="opacity:0.4">/${mx}%</span></span>
          </div>
          ${barHTML((v/mx)*100,c,c+"55",5)}
        </div>`).join("")}
      </div>
    </div>

    ${total>0?`<div>
      <div class="sec">DISTRIBUCIÓN DE GRADES</div>
      <div class="card">
        ${[["S",100],["A",87],["B",77],["C",57],["D",35],["F",0]].map(([l,t])=>{
          const count=allDays.filter(([,d])=>GRADE(d.score).l===l).length;
          const pct=total?(count/total)*100:0;
          const gc=GRADE(t);
          return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:11px">
            <div style="font-family:'Bebas Neue';font-size:18px;color:${count>0?gc.c:"#1e1e2e"};width:14px;text-align:center">${l}</div>
            <div style="flex:1;height:5px;border-radius:99px;background:#0f0f1e;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${gc.c};border-radius:99px"></div>
            </div>
            <div style="font-family:'Bebas Neue';font-size:11px;color:${count>0?gc.c:"#1e1e2e"};width:22px;text-align:right">${count}</div>
            <div style="font-size:9px;color:#1e1e2e;width:32px;text-align:right">${pct>0?Math.round(pct)+"%":""}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`:""}

    ${total>=2?`<div>
      <div class="sec">TENDENCIA — 4 SEMANAS</div>
      <div class="card">
        <div style="display:flex;align-items:flex-end;gap:8px;height:90px;padding-top:20px">
          ${getWeeks().map((week,wi)=>{
            const a=avgWeek(week),g=a>0?GRADE(a):null,bh=a>0?Math.max((a/MAX)*72,6):4;
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px">
              ${a>0?`<div style="font-size:9px;color:${g.c}">${a}</div>`:"<div style='font-size:9px'>&nbsp;</div>"}
              <div style="width:100%;border-radius:5px 5px 0 0;height:${bh}px;background:${g?g.c+"28":"#0f0f1e"};border:1px solid ${g?g.c+"44":"#161626"};border-bottom:none"></div>
              <div style="font-size:8px;color:#252535">S${4-wi}</div>
            </div>`;
          }).join("")}
        </div>
        <div style="height:1px;background:#111120"></div>
      </div>
    </div>`:""}
  </div>`;
}

            <div style="font-size:11px;color:${isT?"#e2e2e2":"#3a3a4a"};letter-spacing:0.06em">${date.toLocaleDateString("es-PA",{weekday:"long",day:"numeric",month:"short"}).toUpperCase()}</div>
            ${isT?`<div style="font-size:8px;color:${GRADE(calcScore(tk).score).c};letter-spacing:0.15em;margin-top:2px">HOY</div>`:""}

              </div>
            </div>
            <div style="font-family:'Bebas Neue';font-size:32px;color:${g.c};text-shadow:0 0 14px ${g.g};line-height:1">${g.l}</div>
            <button onclick="openEditDay('${key}')" style="background:none;border:1px solid #1e1e2e;color:#555;font-family:inherit;font-size:9px;padding:5px 10px;border-radius:7px;cursor:pointer;letter-spacing:0.08em">EDITAR</button>
            `:`<button onclick="openEditDay('${key}')" style="background:#161626;border:1px solid #1e1e2e;color:#888;font-family:inherit;font-size:9px;padding:7px 14px;border-radius:8px;cursor:pointer;letter-spacing:0.1em;font-weight:500">+ REGISTRAR</button>`}

      const a=avgWeek(week),g=a>0?GRADE(a):null;

                ${data?`<span style="font-family:'Bebas Neue';font-size:13px;color:${dg.c}">${dg.l}</span>`:`<span style="font-size:10px;color:#2a2a3a">+</span>`}
              </div>
              ${data?`<div style="font-size:8px;color:#252535">${data.score}</div>`:""}
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderHistYear(){
  const days=getDays(365),months={};
  days.forEach(d=>{
    const mk=d.date.toLocaleDateString("es",{month:"long",year:"numeric"});
    if(!months[mk])months[mk]=[];
    months[mk].push(d);
  });
  const filled=Object.entries(months).filter(([,md])=>md.some(d=>d.data||d.key===todayKey()));
  return`<div style="display:flex;flex-direction:column;gap:14px">
    <div class="sec">CALENDARIO ANUAL</div>
    ${filled.reverse().map(([month,mdays])=>{
      const ma=avgWeek(mdays),mg=ma>0?GRADE(ma):null;
      return`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div style="font-size:10px;color:#3a3a4a;text-transform:uppercase;letter-spacing:0.12em">${month}</div>
          ${mg?`<div style="font-family:'Bebas Neue';font-size:14px;color:${mg.c}">AVG ${ma}%</div>`:""}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${mdays.map(({key,data})=>{
            const dg=data?GRADE(data.score):null,isT=key===todayKey();
            const tgr=GRADE(calcScore(todayKey()).score);
            return`<div onclick="openEditDay('${key}')" title="${data?`${key}: ${data.score}% (${GRADE(data.score).l})`:key}" style="width:22px;height:22px;border-radius:5px;background:${data?dg.c+"20":"#090914"};border:1px solid ${isT?(dg?dg.c:tgr.c)+"66":data?dg.c+"28":"#111120"};display:flex;align-items:center;justify-content:center;cursor:pointer">
              ${data?`<span style="font-family:'Bebas Neue';font-size:10px;color:${dg.c}">${dg.l}</span>`:`<span style="font-size:8px;color:#2a2a3a">·</span>`}
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

// ── ROUTINE RUNNER ────────────────────────────────────────────────────────────
function renderRoutine(){
  if(!routineId)return"";
  const rt=ROUTINES[routineId];
  const current=routineQueue[0]!==undefined?rt.steps[routineQueue[0]]:null;
  const done=Object.keys(routineCompleted).length;
  const total=rt.steps.length;
  const pct=done/total;

  const sesLabel=s=>{
    if(s==="break")return{label:"BREAK",col:"#f59e0b"};
    if(s===1)return{label:"SESIÓN 1",col:"#a78bfa"};
    if(s===2)return{label:"SESIÓN 2",col:"#4ade80"};
    return null;
  };

  if(!current){
    return`<div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'DM Mono',monospace">
      <div style="font-size:48px">🏁</div>
      <div style="font-family:'Bebas Neue';font-size:32px;color:${rt.col};letter-spacing:0.1em">COMPLETADO</div>
      <div style="font-size:12px;color:#444">${rt.label} terminado</div>
      <button onclick="finishRoutine()" style="margin-top:16px;background:${rt.col};color:#080810;border:none;font-family:inherit;font-size:11px;letter-spacing:0.15em;padding:14px 30px;border-radius:12px;cursor:pointer;font-weight:700">✓ MARCAR COMO HECHO</button>
    </div>`;
  }

  const timerPct=timerSecs/(current.dur*60);
  const r=96,c=2*Math.PI*r,off=c-(1-timerPct)*c;
  const col=current.isBreak?"#f59e0b":rt.col;
  const mins=Math.floor(timerSecs/60),secs=timerSecs%60;
  const fmtTime=`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  const sl=current.ses!==undefined?sesLabel(current.ses):null;

  return`<div style="height:100dvh;display:flex;flex-direction:column;background:#07070f;font-family:'DM Mono',monospace;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #111120">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${rt.icon}</span>
        <div>
          <div style="font-family:'Bebas Neue';font-size:18px;letter-spacing:0.15em;color:${rt.col}">${rt.label}</div>
          <div style="font-size:9px;color:#333;letter-spacing:0.12em">${done}/${total} PASOS</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:80px">${barHTML(pct*100,rt.col,rt.col+"44",4)}</div>
        <button onclick="closeRoutine()" style="background:none;border:1px solid #1e1e2e;color:#444;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px">✕</button>
      </div>
    </div>

    ${sl?`<div style="text-align:center;padding:10px 0 0"><span style="font-size:9px;letter-spacing:0.2em;color:${sl.col};border:1px solid ${sl.col}44;border-radius:99px;padding:3px 12px">${sl.label}</span></div>`:""}

    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:0 24px">
      <div style="position:relative;width:220px;height:220px">
        <svg width="220" height="220" style="transform:rotate(-90deg);filter:drop-shadow(0 0 20px ${col}55);overflow:visible">
          <circle cx="110" cy="110" r="${r}" fill="none" stroke="#111122" stroke-width="10"/>
          <circle cx="110" cy="110" r="${r}" fill="none" stroke="${col}" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
            style="transition:stroke-dashoffset 0.5s linear"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
          <div style="font-size:40px;margin-bottom:4px">${current.icon}</div>
          <div style="font-family:'Bebas Neue';font-size:52px;line-height:1;color:${col};letter-spacing:-0.02em">${fmtTime}</div>
          <div style="font-size:9px;color:#444;letter-spacing:0.1em">${current.dur} MIN</div>
        </div>
      </div>

      <div style="text-align:center">
        <div style="font-size:18px;font-weight:500;color:#e2e2e2">${current.label}</div>
        ${routineQueue.length>1?`<div style="font-size:11px;color:#2a2a3a;margin-top:6px">Siguiente: ${rt.steps[routineQueue[1]]?.icon} ${rt.steps[routineQueue[1]]?.label}</div>`:""}
      </div>

      <div style="display:flex;align-items:center;gap:20px;margin-top:8px">
        <button onclick="routineReset()" style="width:48px;height:48px;border-radius:50%;background:#111120;border:1px solid #1e1e2e;color:#666;font-size:18px;cursor:pointer">↺</button>
        <button onclick="routineToggle()" style="width:72px;height:72px;border-radius:50%;background:${timerRunning?col:"#1a1a2e"};border:2px solid ${timerRunning?col:"#2a2a4a"};color:${timerRunning?"#080810":"#e2e2e2"};font-size:26px;cursor:pointer;box-shadow:${timerRunning?`0 0 24px ${col}55`:"none"};transition:all 0.2s">
          ${timerRunning?"⏸":"▶"}
        </button>
        <button onclick="routineNext()" style="width:48px;height:48px;border-radius:50%;background:#111120;border:1px solid #1e1e2e;color:#666;font-size:18px;cursor:pointer">⏭</button>
      </div>

      <button onclick="routineSendToEnd()" style="background:none;border:1px solid #161626;color:#333;font-family:inherit;font-size:9px;letter-spacing:0.15em;padding:7px 18px;border-radius:8px;cursor:pointer">MOVER AL FINAL</button>
    </div>

    <div style="border-top:1px solid #0f0f1e;max-height:180px;overflow-y:auto">
      ${routineQueue.map((idx,qi)=>{
        const s=rt.steps[idx],isCur=qi===0;
        return`<div style="display:flex;align-items:center;gap:12px;padding:8px 20px;background:${isCur?rt.col+"08":"transparent"};border-left:2px solid ${isCur?rt.col:"transparent"}">
          <span style="font-size:16px;opacity:${isCur?1:0.4}">${s.icon}</span>
          <div style="flex:1"><div style="font-size:12px;color:${isCur?"#e2e2e2":"#333"};font-weight:${isCur?500:300}">${s.label}</div></div>
          <div style="font-size:10px;color:${isCur?rt.col:"#252535"}">${s.dur}m</div>
        </div>`;
      }).join("")}
      ${Object.keys(routineCompleted).length>0?`<div style="padding:8px 20px 0;border-top:1px solid #0f0f1e;margin-top:4px">
        ${Object.keys(routineCompleted).map(idx=>{
          const s=rt.steps[idx];
          return`<div style="display:flex;align-items:center;gap:12px;padding:6px 0;opacity:0.3">
            <span style="font-size:14px">✓</span>
            <div style="font-size:11px;color:#444;text-decoration:line-through">${s.label}</div>
          </div>`;
        }).join("")}
      </div>`:""}
    </div>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(t){currentTab=t;render();}
function setHistTab(t){histTab=t;render();}

function toggleHabit(id,key){
  const ch=getChecked(key);
  ch[id]=!ch[id];
  setChecked(key,ch);
  saveToHistory(key);
  render();
}

function quickComplete(id){
  const ch=getChecked(todayKey());
  ch[id]=true;
  setChecked(todayKey(),ch);
  saveToHistory(todayKey());
  render();
}

function handleSocial(key){
  if(socialExpanded)return;
  const ch=getChecked(key),soc=getSocial(key);
  const v=!ch.social;
  ch.social=v;
  setChecked(key,ch);
  setSocial(key,{flirt:v,strangers:v,friends:v});
  saveToHistory(key);
  render();
}

function toggleSocialExpand(key){socialExpanded=!socialExpanded;render();}

function toggleSub(id,key){
  const soc=getSocial(key);
  soc[id]=!soc[id];
  setSocial(key,soc);
  const ch=getChecked(key);
  ch.social=Object.values(soc).some(Boolean);
  setChecked(key,ch);
  saveToHistory(key);
  render();
}

function resetDay(key){
  setChecked(key,{});
  setSocial(key,{flirt:false,strangers:false,friends:false});
  saveToHistory(key);
  render();
}

function openEditDay(key){editDayKey=key;socialExpanded=false;render();}
function closeEditDay(){editDayKey=null;socialExpanded=false;render();}

// ── ROUTINE ACTIONS ───────────────────────────────────────────────────────────
function startRoutine(id){
  routineId=id;
  routineQueue=ROUTINES[id].steps.map((_,i)=>i);
  routineCompleted={};
  timerSecs=ROUTINES[id].steps[0].dur*60;
  timerRunning=false;
  if(timerInterval)clearInterval(timerInterval);
  render();
}

function closeRoutine(){
  if(timerInterval)clearInterval(timerInterval);
  timerRunning=false;timerInterval=null;
  routineId=null;routineQueue=[];routineCompleted={};
  render();
}

function finishRoutine(){
  const id=routineId;
  closeRoutine();
  quickComplete(id);
  setTab("home");
}

function routineToggle(){
  timerRunning=!timerRunning;
  if(timerRunning){
    timerInterval=setInterval(()=>{
      if(timerSecs<=1){clearInterval(timerInterval);timerRunning=false;routineNext();}
      else{timerSecs--;renderRoutineTimer();}
    },1000);
  } else {
    clearInterval(timerInterval);
  }
  render();
}

function routineReset(){
  clearInterval(timerInterval);timerRunning=false;
  if(routineId&&routineQueue.length>0)timerSecs=ROUTINES[routineId].steps[routineQueue[0]].dur*60;
  render();
}

function routineNext(){
  clearInterval(timerInterval);timerRunning=false;
  if(routineQueue.length===0)return;
  routineCompleted[routineQueue[0]]=true;
  routineQueue=routineQueue.slice(1);
  if(routineQueue.length>0)timerSecs=ROUTINES[routineId].steps[routineQueue[0]].dur*60;
  render();
}

function routineSendToEnd(){
  if(routineQueue.length<2)return;
  routineQueue=[...routineQueue.slice(1),routineQueue[0]];
  clearInterval(timerInterval);timerRunning=false;
  timerSecs=ROUTINES[routineId].steps[routineQueue[0]].dur*60;
  render();
}

function renderRoutineTimer(){
  // Fast-update only the timer display without full re-render
  const rt=ROUTINES[routineId];
  const current=routineQueue[0]!==undefined?rt.steps[routineQueue[0]]:null;
  if(!current)return;
  const mins=Math.floor(timerSecs/60),secs=timerSecs%60;
  const fmtTime=`${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  const col=current.isBreak?"#f59e0b":rt.col;
  const r=96,c=2*Math.PI*r,timerPct=timerSecs/(current.dur*60),off=c-(1-timerPct)*c;

  // Update SVG circle
  const circles=document.querySelectorAll("circle[stroke-dasharray]");
  if(circles.length>0)circles[0].setAttribute("stroke-dashoffset",off);

  // Update time text
  const timeEls=document.querySelectorAll("[data-timer]");
  timeEls.forEach(el=>el.textContent=fmtTime);

  // Fallback: find by content pattern
  const allDivs=document.querySelectorAll("div");
  allDivs.forEach(div=>{
    if(/^\d{2}:\d{2}$/.test(div.textContent.trim())&&div.style.fontFamily&&div.style.fontFamily.includes("Bebas")){
      div.textContent=fmtTime;
    }
  });
}

// ── SWIPE NAVIGATION ─────────────────────────────────────────────────────────
const TABS_ORDER = ["home","today","stats","history"];
let touchStartX = 0, touchStartY = 0;

document.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 0.8) return; // too short or too vertical
  // Swipe right → back from overlays
  if (dx > 0) {
    if (editDayKey) { closeEditDay(); return; }
    if (routineId) { closeRoutine(); return; }
  }
  if (routineId || editDayKey) return; // no tab swipe inside overlays
  const idx = TABS_ORDER.indexOf(currentTab);
  if (dx < 0 && idx < TABS_ORDER.length - 1) setTab(TABS_ORDER[idx + 1]);
  if (dx > 0 && idx > 0) setTab(TABS_ORDER[idx - 1]);
}, { passive: true });

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
syncHistory();

// Poll Supabase every 15 seconds for changes from other devices
setInterval(async () => {
  const remote = await dbGetAll();
  if (Object.keys(remote).length === 0) return;
  const local = getHistory();
  let changed = false;
  // Check if remote has newer data
  for (const [date, data] of Object.entries(remote)) {
    if (!local[date] || JSON.stringify(local[date]) !== JSON.stringify(data)) {
      changed = true;
      break;
    }
  }
  if (changed) {
    const tk = todayKey();
    for (const [date, data] of Object.entries(remote)) {
      if (data._checks) {
        const existing = getChecked(date);
        const remoteCount = Object.values(data._checks).filter(Boolean).length;
        const localCount = Object.values(existing).filter(Boolean).length;
        if (remoteCount >= localCount) {
          setChecked(date, data._checks);
          if (data._social) setSocial(date, data._social);
        }
      }
      const {_checks, _social, ...entry} = data;
      _historyCache[date] = entry;
    }
    set("shaah_history", _historyCache);
    render();
  }
}, 15000);

</script>
